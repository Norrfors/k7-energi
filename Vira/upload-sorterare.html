<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medlemslista - Universal Sorterare</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-top: 0;
            font-size: 28px;
        }
        
        .upload-section {
            background: #f9f9f9;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        
        .upload-section.dragover {
            background: #f0f4ff;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }
        
        .upload-section h2 {
            color: #667eea;
            margin-top: 0;
            font-size: 20px;
        }
        
        .upload-section p {
            color: #666;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .upload-section code {
            background: #e8eef9;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
            color: #333;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            margin: 10px;
        }
        
        .file-input-label:hover {
            background: #5568d3;
        }
        
        .file-name {
            color: #764ba2;
            font-weight: 600;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .table-section {
            display: none;
            margin-top: 30px;
        }
        
        .table-section.active {
            display: block;
        }
        
        .info {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .controls {
            margin-bottom: 20px;
        }
        
        .search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            border: none;
            transition: background 0.3s;
        }
        
        th:hover {
            background: #5568d3;
        }
        
        th.sort-asc::after {
            content: " ▲";
            font-size: 12px;
        }
        
        th.sort-desc::after {
            content: " ▼";
            font-size: 12px;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background-color: #f9f9f9;
        }
        
        tr:nth-child(even) {
            background-color: #f5f5f5;
        }
        
        tr:nth-child(even):hover {
            background-color: #efefef;
        }
        
        .stats {
            text-align: right;
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .no-results {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }
        
        .error {
            background: #ffebee;
            border: 1px solid #ef5350;
            border-radius: 4px;
            padding: 15px;
            color: #c62828;
            margin-bottom: 20px;
            display: none;
        }
        
        .error.active {
            display: block;
        }
        
        .success {
            background: #e8f5e9;
            border: 1px solid #66bb6a;
            border-radius: 4px;
            padding: 15px;
            color: #2e7d32;
            margin-bottom: 20px;
            display: none;
        }
        
        .success.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Medlemslista Sorterare</h1>
        
        <div class="error" id="errorDiv"></div>
        <div class="success" id="successDiv"></div>
        
        <div class="upload-section" id="uploadSection">
            <h2>Ladda upp din medlemslista</h2>
            <p>Textfilen ska ha formatet: <code>Nr;Förnamn;Efternamn</code></p>
            <p>En person per rad</p>
            
            <div class="file-input-wrapper">
                <label for="fileInput" class="file-input-label">📁 Välj textfil</label>
                <input type="file" id="fileInput" accept=".txt" />
            </div>
            
            <div class="file-name" id="fileName"></div>
        </div>
        
        <div class="table-section" id="tableSection">
            <div class="info">Klicka på kolumnrubrikerna för att sortera, använd sökfältet för att filtrera</div>
            
            <div class="controls">
                <input type="text" class="search-box" id="searchBox" placeholder="🔍 Sök...">
            </div>
            
            <table id="membersTable">
                <thead>
                    <tr id="headerRow">
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
            
            <div class="stats">
                Visning: <span id="displayCount">0</span> / <span id="totalCount">0</span> medlemmar
            </div>
        </div>
    </div>

    <script>
        let members = [];
        let filteredMembers = [];
        let columnHeaders = ['Nr', 'Förnamn', 'Efternamn'];
        let currentSort = { column: null, ascending: true };

        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const errorDiv = document.getElementById('errorDiv');
        const successDiv = document.getElementById('successDiv');
        const uploadSection = document.getElementById('uploadSection');
        const tableSection = document.getElementById('tableSection');
        const searchBox = document.getElementById('searchBox');

        function showError(message) {
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('active');
            successDiv.classList.remove('active');
        }

        function showSuccess(message) {
            successDiv.textContent = '✅ ' + message;
            successDiv.classList.add('active');
            errorDiv.classList.remove('active');
        }

        fileInput.addEventListener('change', handleFileUpload);

        // Drag-and-drop support
        const uploadSectionDiv = document.getElementById('uploadSection');
        
        uploadSectionDiv.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSectionDiv.classList.add('dragover');
        });

        uploadSectionDiv.addEventListener('dragleave', () => {
            uploadSectionDiv.classList.remove('dragover');
        });

        uploadSectionDiv.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSectionDiv.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileUpload({ target: fileInput });
            }
        });

        function handleFileUpload(event) {
            const file = event.target.files[0];
            
            if (!file) return;

            // Validera filtyp
            if (!file.name.endsWith('.txt')) {
                showError('Vänligen välj en .txt-fil');
                return;
            }

            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    parseFile(content, file.name);
                } catch (error) {
                    showError('Fel vid läsning av fil: ' + error.message);
                }
            };

            reader.onerror = function() {
                showError('Kunde inte läsa filen');
            };

            reader.readAsText(file, 'utf-8');
        }

        function parseFile(content, filename) {
            const lines = content.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            
            if (lines.length === 0) {
                showError('Filen är tom');
                return;
            }

            members = [];
            
            for (let line of lines) {
                // Hantera båda semikolon och tab som separatorer
                let parts = line.split(';').map(p => p.trim());
                
                // Om det inte finns två semikolon, prova tab
                if (parts.length < 3) {
                    parts = line.split('\t').map(p => p.trim());
                }
                
                if (parts.length >= 3) {
                    members.push(parts.slice(0, 3));
                }
            }

            if (members.length === 0) {
                showError('Kunde inte tolka filen. Kontrollera formatet: Nr;Förnamn;Efternamn');
                return;
            }

            // Detektera kolumnnamn från första raden om det ser ut som rubrik
            const firstRow = members[0];
            if (isNaN(firstRow[0]) || firstRow[0].toLowerCase() === 'nr' || firstRow[0].toLowerCase() === 'nummer') {
                // Första raden ser ut som rubrik, använd den
                columnHeaders = firstRow;
                members.shift();
            } else {
                columnHeaders = ['Nr', 'Förnamn', 'Efternamn'];
            }

            filteredMembers = [...members];
            showSuccess(`${members.length} medlemmar inlästa från ${filename}`);
            fileName.textContent = `📄 Fil: ${filename}`;
            
            uploadSection.style.display = 'none';
            tableSection.classList.add('active');
            
            renderTable(filteredMembers);
            setupTable();
            searchBox.value = '';
        }

        function setupTable() {
            const headerRow = document.getElementById('headerRow');
            headerRow.innerHTML = '';
            
            columnHeaders.forEach((header, index) => {
                const th = document.createElement('th');
                th.textContent = header;
                th.style.cursor = 'pointer';
                th.onclick = () => sortTable(index);
                headerRow.appendChild(th);
            });
        }

        function renderTable(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            if (data.length === 0) {
                const row = tableBody.insertRow();
                const cell = row.insertCell(0);
                cell.colSpan = columnHeaders.length;
                cell.classList.add('no-results');
                cell.textContent = 'Inga medlemmar funna';
            } else {
                data.forEach(member => {
                    const row = tableBody.insertRow();
                    member.forEach(value => {
                        const cell = row.insertCell();
                        cell.textContent = value;
                    });
                });
            }

            document.getElementById('displayCount').textContent = data.length;
            document.getElementById('totalCount').textContent = members.length;
        }

        function sortTable(column) {
            if (currentSort.column === column) {
                currentSort.ascending = !currentSort.ascending;
            } else {
                currentSort.column = column;
                currentSort.ascending = true;
            }

            filteredMembers.sort((a, b) => {
                let aVal = a[column];
                let bVal = b[column];

                // Försök parsa som nummer om det verkar vara nummer
                let aNum = parseInt(aVal);
                let bNum = parseInt(bVal);
                
                if (!isNaN(aNum) && !isNaN(bNum)) {
                    aVal = aNum;
                    bVal = bNum;
                } else {
                    aVal = String(aVal).toLowerCase().trim();
                    bVal = String(bVal).toLowerCase().trim();
                }

                if (aVal < bVal) return currentSort.ascending ? -1 : 1;
                if (aVal > bVal) return currentSort.ascending ? 1 : -1;
                return 0;
            });

            renderTable(filteredMembers);
            updateSortIndicators();
        }

        function updateSortIndicators() {
            const headers = document.querySelectorAll('#headerRow th');
            headers.forEach((h, i) => {
                h.classList.remove('sort-asc', 'sort-desc');
                if (currentSort.column === i) {
                    h.classList.add(currentSort.ascending ? 'sort-asc' : 'sort-desc');
                }
            });
        }

        function filterMembers(searchTerm) {
            const term = searchTerm.toLowerCase().trim();
            
            if (term === '') {
                filteredMembers = [...members];
            } else {
                filteredMembers = members.filter(member => {
                    return member.some(cell => 
                        String(cell).toLowerCase().includes(term)
                    );
                });
            }

            if (currentSort.column !== null) {
                sortTable(currentSort.column);
            } else {
                renderTable(filteredMembers);
            }
        }

        searchBox.addEventListener('keyup', (e) => {
            filterMembers(e.target.value);
        });
    </script>
</body>
</html>
